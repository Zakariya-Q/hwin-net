name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [''3.11'', ''3.12'']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run tests
      run: |
        pytest --tb=short -v

    - name: Run linting
      run: |
        pip install -r requirements-dev.txt
        black --check .
        ruff check .
        mypy --ignore-missing-imports hwin_net

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ''3.11''
        cache: 'pip'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: |
        python -m build

    - name: Verify package
      run: |
        pip install dist/hwin_net-*.whl
        python -c "import hwin_net; print(hwin_net.__version__)"
        python -c "from hwin_net.models import HWINNet; print('Models import OK')"
        python -c "from hwin_net.datasets import create_dataloaders; print('Datasets import OK')"
        python -c "from hwin_net.losses import TotalLoss; print('Losses import OK')"
        python -c "from hwin_net.training import Train_HWIN; print('Training import OK')"
        python -c "from hwin_net.inference import InferenceEngine; print('Inference import OK')"
        python -c "from hwin_net.utils import set_seed; print('Utils import OK')"
        echo 'All imports successful!'

  docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ''3.11''

    - name: Install dependencies
      run: |
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Check docs build
      run: |
        cd docs && make html || echo 'Docs build skipped (no docs yet)'
