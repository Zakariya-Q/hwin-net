# Training Configuration
training:
  max_epochs: 100
  batch_size: 32
  val_batch_size: 64
  use_ttur: true
  lr_main: 0.001
  lr_recovery: 0.0005
  lr_adversarial: 0.0002
  optimizer_type: adamw
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  scheduler_type: cosine
  warmup_epochs: 5
  min_lr: 1e-6
  step_size: 30
  gamma: 0.1
  plateau_patience: 10
  plateau_factor: 0.5
  grad_clip_norm: 1.0
  use_mixed_precision: true
  checkpoint_dir: ./checkpoints
  save_every_n_epochs: 10
  keep_last_n_checkpoints: 3
  resume_from: null
  validate_every_n_epochs: 1
  early_stopping_patience: 20
  early_stopping_metric: val_loss
  early_stopping_mode: min
  seed: 42
  deterministic: true
  device: auto
  num_workers: 4
  pin_memory: true
